name: TennisTracker
options:
  bundleIdPrefix: com.racquetvision
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES

targets:
  TennisTracker:
    type: application
    platform: iOS
    sources:
      - path: TennisTracker
        type: group
    info:
      path: TennisTracker/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "RacquetVision needs camera access to detect and track tennis balls in real-time."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.racquetvision.tennistracker
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: TennisTracker/Info.plist
